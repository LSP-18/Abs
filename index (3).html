<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborator Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --primary-light: #FF8A65;
            --primary-dark: #E55100;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --bg-tertiary: #F0F2F5;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* HEADER */
        header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .search-box input::placeholder {
            color: var(--text-tertiary);
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 16px;
        }

        .upload-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(255, 107, 53, 0.2);
        }

        #fileUpload {
            display: none;
        }

        /* MAIN */
        .main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* METRICS */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .metric-card:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .metric-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .metric-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* CONTAINER */
        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .sidebar-header h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-filters {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .clear-filters:hover {
            background: rgba(255, 107, 53, 0.1);
        }

        .sidebar-content {
            padding: 1rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-radius: 4px;
            user-select: none;
            transition: background 0.2s;
        }

        .filter-title:hover {
            background: var(--bg-tertiary);
        }

        .filter-title span {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .filter-option:hover {
            background: var(--bg-tertiary);
        }

        .filter-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .filter-option label {
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            flex: 1;
        }

        .sidebar-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* TABLE */
        .table-wrapper {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            font-size: 12px;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }

        tbody tr:hover {
            background: var(--bg-tertiary);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            min-width: 32px;
        }

        .status-badge.P { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .status-badge.FO { background: rgba(239, 68, 68, 0.1); color: var(--error); }
        .status-badge.DSR { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .status-badge.AM { background: rgba(59, 130, 246, 0.1); color: var(--info); }
        .status-badge.DF { background: rgba(139, 92, 246, 0.1); color: #8B5CF6; }
        .status-badge.DV { background: rgba(236, 72, 153, 0.1); color: #EC4899; }
        .status-badge.FE { background: rgba(6, 182, 212, 0.1); color: #06B6D4; }
        .status-badge.AL { background: rgba(107, 114, 128, 0.1); color: #6B7280; }
        .status-badge.F { background: rgba(249, 115, 22, 0.1); color: #F97316; }
        .status-badge.BH { background: rgba(168, 85, 247, 0.1); color: #A855F7; }
        .status-badge.DP { background: rgba(34, 197, 94, 0.1); color: #22C55E; }
        .status-badge.NC { background: rgba(156, 163, 175, 0.1); color: #9CA3AF; }
        .status-badge.S1 { background: rgba(34, 197, 94, 0.1); color: #22C55E; }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
            }

            .search-box {
                max-width: 100%;
                order: 3;
                flex-basis: 100%;
            }

            .metrics {
                grid-template-columns: repeat(2, 1fr);
            }

            .metric-value {
                font-size: 24px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">S</div>
                <div class="logo-text">
                    <h1>Collaborator</h1>
                </div>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar...">
            </div>
            <button class="upload-btn" onclick="document.getElementById('fileUpload').click()">
                📤 Atualizar
            </button>
            <input type="file" id="fileUpload" accept=".csv,.tsv,.txt">
        </div>
    </header>

    <div class="main">
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Total</div>
                <div class="metric-value" id="totalCount">119</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Presentes</div>
                <div class="metric-value" id="presentCount">0</div>
                <div class="metric-subtitle" id="presentPercent">0%</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Ausentes</div>
                <div class="metric-value" id="absentCount">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Licença</div>
                <div class="metric-value" id="leaveCount">0</div>
            </div>
        </div>

        <div class="container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>Filtros <button class="clear-filters" id="clearBtn" style="display: none;">Limpar</button></h3>
                </div>
                <div class="sidebar-content">
                    <div class="filter-group">
                        <div class="filter-title" onclick="toggleGroup(this)">BPO <span>▼</span></div>
                        <div class="filter-options" id="bpoOptions"></div>
                    </div>
                    <div class="filter-group">
                        <div class="filter-title" onclick="toggleGroup(this)">Status <span>▼</span></div>
                        <div class="filter-options" id="statusOptions"></div>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <span id="resultCount">119 resultados</span>
                </div>
            </div>

            <div class="table-wrapper">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Código</th>
                                <th>BPO</th>
                                <th>Cargo</th>
                                <th>Contrato</th>
                                <th>Admissão</th>
                                <th colspan="30">Status</th>
                            </tr>
                            <tr id="daysHeader" style="background: var(--bg-tertiary); border-bottom: 1px solid var(--border);">
                                <th colspan="7"></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let collaboratorsData = [];

        function initApp() {
            collaboratorsData = DADOS_COLABORADORES.map(c => ({
                ...c,
                Nome: c['Nome do colaborador(a)'].split(' ').slice(0, -1).join(' ')
            }));

            populateDayHeaders();
            initFilters();
            renderTable(collaboratorsData);
            updateMetrics();
        }

        function populateDayHeaders() {
            const header = document.getElementById('daysHeader');
            const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
            
            let html = '<th colspan="7"></th>';
            for (let i = 1; i <= 30; i++) {
                const date = new Date(2026, 3, i);
                const day = days[date.getDay()];
                html += `<th style="text-align: center; font-size: 11px;"><div>${i}</div><div style="color: var(--text-tertiary);">${day}</div></th>`;
            }
            header.innerHTML = html;
        }

        function initFilters() {
            const bpos = [...new Set(collaboratorsData.map(c => c.BPO))].sort();
            const statuses = getStatuses();

            const bpoDiv = document.getElementById('bpoOptions');
            bpos.forEach(bpo => {
                const label = document.createElement('label');
                label.className = 'filter-option';
                label.innerHTML = `<input type="checkbox" value="${bpo}" onchange="applyFilters()"><span>${bpo}</span>`;
                bpoDiv.appendChild(label);
            });

            const statusDiv = document.getElementById('statusOptions');
            statuses.forEach(status => {
                const label = document.createElement('label');
                label.className = 'filter-option';
                label.innerHTML = `<input type="checkbox" value="${status}" onchange="applyFilters()"><span>${status}</span>`;
                statusDiv.appendChild(label);
            });
        }

        function getStatuses() {
            const s = new Set();
            collaboratorsData.forEach(c => {
                for (let i = 1; i <= 30; i++) {
                    const status = c[`${String(i).padStart(2, '0')}/04/2026`];
                    if (status) s.add(status);
                }
            });
            return Array.from(s).sort();
        }

        function toggleGroup(el) {
            el.nextElementSibling.style.display = 
                el.nextElementSibling.style.display === 'none' ? 'flex' : 'none';
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const bpos = Array.from(document.querySelectorAll('#bpoOptions input:checked')).map(c => c.value);
            const statuses = Array.from(document.querySelectorAll('#statusOptions input:checked')).map(c => c.value);

            const filtered = collaboratorsData.filter(c => {
                const matchSearch = c.Código.toLowerCase().includes(search) || c.Nome.toLowerCase().includes(search);
                const matchBpo = bpos.length === 0 || bpos.includes(c.BPO);
                
                let matchStatus = statuses.length === 0;
                if (statuses.length > 0) {
                    for (let i = 1; i <= 30; i++) {
                        if (statuses.includes(c[`${String(i).padStart(2, '0')}/04/2026`])) {
                            matchStatus = true;
                            break;
                        }
                    }
                }

                return matchSearch && matchBpo && matchStatus;
            });

            renderTable(filtered);
            document.getElementById('resultCount').textContent = filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');
            document.getElementById('clearBtn').style.display = 
                document.querySelectorAll('input:checked').length > 0 || search ? 'block' : 'none';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(c => {
                let statusCells = '';
                for (let i = 1; i <= 30; i++) {
                    const status = c[`${String(i).padStart(2, '0')}/04/2026`] || '';
                    statusCells += `<td style="text-align: center;">${status ? `<span class="status-badge ${status}">${status}</span>` : ''}</td>`;
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${c.Nome}</td>
                    <td>${c.Código}</td>
                    <td><strong>${c.BPO}</strong></td>
                    <td>${c.Cargo.substring(0, 20)}</td>
                    <td>${c.Contrato.substring(0, 10)}</td>
                    <td>${c.Admissão}</td>
                    ${statusCells}
                `;
                tbody.appendChild(row);
            });
        }

        function updateMetrics() {
            const today = `${String(new Date().getDate()).padStart(2, '0')}/04/2026`;
            let present = 0, absent = 0, leave = 0;

            collaboratorsData.forEach(c => {
                const status = c[today];
                if (status === 'P') present++;
                else if (status === 'FO') absent++;
                else if (['DSR', 'DF', 'DV', 'FE', 'AL'].includes(status)) leave++;
            });

            document.getElementById('presentCount').textContent = present;
            document.getElementById('absentCount').textContent = absent;
            document.getElementById('leaveCount').textContent = leave;
            document.getElementById('presentPercent').textContent = 
                Math.round(present / collaboratorsData.length * 100) + '%';
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
            document.getElementById('searchInput').value = '';
            applyFilters();
        });

        document.getElementById('fileUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const lines = event.target.result.trim().split('\n');
                    const headers = lines[0].split('\t');
                    const data = [];

                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split('\t');
                        const row = {};
                        for (let j = 0; j < headers.length; j++) {
                            row[headers[j].trim()] = values[j] ? values[j].trim() : '';
                        }
                        if (row['Código'] && row['Código'] !== 'Não encontrado, contate WFM') {
                            data.push(row);
                        }
                    }

                    if (data.length > 0) {
                        collaboratorsData = data.map(c => ({
                            ...c,
                            Nome: c['Nome do colaborador(a)'].split(' ').slice(0, -1).join(' ')
                        }));

                        document.getElementById('bpoOptions').innerHTML = '';
                        document.getElementById('statusOptions').innerHTML = '';
                        initFilters();
                        renderTable(collaboratorsData);
                        updateMetrics();
                        document.getElementById('searchInput').value = '';
                        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
                        alert('✓ Dados atualizados: ' + data.length + ' colaboradores');
                    }
                } catch (error) {
                    alert('Erro ao processar arquivo');
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
