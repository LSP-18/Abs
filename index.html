<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de ABs do Mês - Shopee</title>
    <link rel="icon" href="https://cdn.awsli.com.br/800x800/2015/2015798/produto/354645871/shoppe--2--mvj1hgvttt.png">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --shopee-orange: #EE4D2D;
            --shopee-orange-light: #FFF5F1;
            --shopee-bg: #F6F6F6;
            --shopee-white: #FFFFFF;
            --shopee-text-main: #222222;
            --shopee-text-muted: #757575;
            --shopee-border: #E8E8E8;
            --shopee-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--shopee-bg);
            color: var(--shopee-text-main);
            line-height: 1.6;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* --- HEADER --- */
        header {
            background: var(--shopee-white);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: var(--shopee-shadow);
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid var(--shopee-orange);
        }

        .header-info h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--shopee-text-main);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 15px;
            color: var(--shopee-text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shopee-logo { height: 36px; }

        /* --- FILTERS --- */
        .filter-section {
            background: var(--shopee-white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shopee-shadow);
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 700;
            color: var(--shopee-text-muted);
            text-transform: uppercase;
        }

        .filter-group select, .filter-group input {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--shopee-border);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
            min-width: 200px;
        }

        .filter-group select:focus, .filter-group input:focus {
            border-color: var(--shopee-orange);
        }

        /* --- TABLE --- */
        .table-container {
            background: var(--shopee-white);
            border-radius: var(--radius);
            box-shadow: var(--shopee-shadow);
            overflow: hidden;
        }

        .table-header {
            padding: 24px;
            border-bottom: 1px solid var(--shopee-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #F9FAFB; 
            padding: 18px 24px; 
            font-size: 12px; 
            font-weight: 800; 
            color: var(--shopee-text-muted); 
            text-transform: uppercase; 
            text-align: left; 
            border-bottom: 2px solid var(--shopee-border); 
        }
        td { padding: 16px 24px; font-size: 14px; border-bottom: 1px solid var(--shopee-border); }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-am { background: #E0F2FE; color: #0369A1; }
        .badge-outros { background: #F3F4F6; color: #374151; }
        
        .status-ab { color: #EE4D2D; font-weight: 700; }

        .no-results {
            padding: 48px;
            text-align: center;
            color: var(--shopee-text-muted);
            font-weight: 500;
        }

        footer { text-align: center; padding: 48px 0; color: var(--shopee-text-muted); font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-info">
            <h1>Controle de ABs do Mês</h1>
            <p><i data-lucide="calendar" size="16"></i> Gestão de Ausências e Abonos • Abril 2026</p>
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Shopee_logo.svg/1200px-Shopee_logo.svg.png" alt="Shopee" class="shopee-logo">
    </header>

    <div class="filter-section">
        <div class="filter-group">
            <label for="unit-filter">Filtrar por Unidade</label>
            <select id="unit-filter">
                <option value="all">Todas as Unidades</option>
                <option value="AM">AM (Amazonas)</option>
                <option value="SP">SP (São Paulo)</option>
                <option value="RJ">RJ (Rio de Janeiro)</option>
                <option value="MG">MG (Minas Gerais)</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="search-name">Buscar por Nome</label>
            <input type="text" id="search-name" placeholder="Digite o nome...">
        </div>
    </div>

    <div class="table-container">
        <div class="table-header">
            <h2><i data-lucide="users" size="20"></i> Lista de Colaboradores</h2>
            <span id="count-label" style="font-size: 13px; font-weight: 600; color: var(--shopee-text-muted);">Mostrando 0 pessoas</span>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nome do Colaborador</th>
                        <th>Unidade</th>
                        <th>Cargo</th>
                        <th>Total ABs</th>
                        <th>Última Ocorrência</th>
                    </tr>
                </thead>
                <tbody id="abs-table-body">
                    <!-- Dados serão inseridos via JS -->
                </tbody>
            </table>
            <div id="no-results-msg" class="no-results" style="display: none;">
                Nenhum colaborador encontrado para os filtros selecionados.
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Shopee Brasil • Dashboard de Gestão Interna</p>
    </footer>
</div>

<script>
    // Dados de exemplo (Simulando uma base de dados)
    const colaboradores = [
        { nome: "Ana Silva", unidade: "AM", cargo: "Operador de Logística", totalAbs: 2, ultima: "05/04/2026" },
        { nome: "Bruno Santos", unidade: "SP", cargo: "Líder de Equipe", totalAbs: 0, ultima: "-" },
        { nome: "Carlos Oliveira", unidade: "AM", cargo: "Auxiliar Administrativo", totalAbs: 1, ultima: "02/04/2026" },
        { nome: "Daniela Lima", unidade: "RJ", cargo: "Operador de Logística", totalAbs: 3, ultima: "08/04/2026" },
        { nome: "Eduardo Costa", unidade: "AM", cargo: "Conferente", totalAbs: 0, ultima: "-" },
        { nome: "Fernanda Souza", unidade: "MG", cargo: "Operador de Logística", totalAbs: 1, ultima: "01/04/2026" },
        { nome: "Gabriel Rocha", unidade: "AM", cargo: "Operador de Logística", totalAbs: 4, ultima: "07/04/2026" },
        { nome: "Helena Martins", unidade: "SP", cargo: "Auxiliar de Limpeza", totalAbs: 0, ultima: "-" },
        { nome: "Igor Pereira", unidade: "AM", cargo: "Operador de Logística", totalAbs: 2, ultima: "03/04/2026" },
        { nome: "Juliana Alves", unidade: "RJ", cargo: "Líder de Equipe", totalAbs: 1, ultima: "06/04/2026" }
    ];

    const tableBody = document.getElementById('abs-table-body');
    const unitFilter = document.getElementById('unit-filter');
    const searchName = document.getElementById('search-name');
    const countLabel = document.getElementById('count-label');
    const noResultsMsg = document.getElementById('no-results-msg');

    function renderTable() {
        const selectedUnit = unitFilter.value;
        const searchText = searchName.value.toLowerCase();
        
        // Filtragem
        const filtered = colaboradores.filter(c => {
            const matchesUnit = selectedUnit === 'all' || c.unidade === selectedUnit;
            const matchesName = c.nome.toLowerCase().includes(searchText);
            return matchesUnit && matchesName;
        });

        // Limpar tabela
        tableBody.innerHTML = '';

        if (filtered.length === 0) {
            noResultsMsg.style.display = 'block';
            countLabel.textContent = 'Mostrando 0 pessoas';
        } else {
            noResultsMsg.style.display = 'none';
            countLabel.textContent = `Mostrando ${filtered.length} pessoa(s)`;
            
            filtered.forEach(c => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight: 700;">${c.nome}</td>
                    <td><span class="badge ${c.unidade === 'AM' ? 'badge-am' : 'badge-outros'}">${c.unidade}</span></td>
                    <td>${c.cargo}</td>
                    <td class="${c.totalAbs > 0 ? 'status-ab' : ''}">${c.totalAbs}</td>
                    <td>${c.ultima}</td>
                `;
                tableBody.appendChild(row);
            });
        }
    }

    // Event Listeners
    unitFilter.addEventListener('change', renderTable);
    searchName.addEventListener('input', renderTable);

    // Inicializar
    renderTable();
    lucide.createIcons();
</script>

</body>
</html>
