<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborator Hub - Shopee</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --shopee-orange: #EE7752;
            --shopee-orange-dark: #D85A3D;
            --shopee-orange-light: #FF8A65;
            --shopee-white: #FFFFFF;
            --shopee-gray-light: #F5F5F5;
            --shopee-gray-medium: #E8E8E8;
            --shopee-gray-dark: #999999;
            --shopee-text: #222222;
            --shopee-text-light: #666666;
            --shopee-success: #1DBF60;
            --shopee-error: #EE4D2D;
            --shopee-warning: #FFAA00;
            --shopee-info: #0066FF;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #F5F5F5 0%, #FAFAFA 100%);
            color: var(--shopee-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--shopee-white) 0%, #FAFAFA 100%);
            border-bottom: 2px solid var(--shopee-orange);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(238, 119, 82, 0.1);
        }

        .header-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--shopee-orange) 0%, var(--shopee-orange-dark) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(238, 119, 82, 0.3);
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--shopee-text);
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--shopee-orange);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 2.8rem;
            border: 2px solid var(--shopee-gray-medium);
            border-radius: 8px;
            background-color: var(--shopee-white);
            color: var(--shopee-text);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .search-container input::placeholder {
            color: var(--shopee-gray-dark);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--shopee-orange);
            box-shadow: 0 0 0 4px rgba(238, 119, 82, 0.15);
            background: var(--shopee-white);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--shopee-orange);
            font-size: 18px;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* ===== ANALYTICS GRID ===== */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .analytics-card {
            background: var(--shopee-white);
            border: 1px solid var(--shopee-gray-medium);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .analytics-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--shopee-orange), var(--shopee-orange-light));
        }

        .analytics-card:hover {
            box-shadow: 0 8px 24px rgba(238, 119, 82, 0.15);
            transform: translateY(-2px);
        }

        .analytics-card-content {
            flex: 1;
        }

        .analytics-card-label {
            font-size: 13px;
            color: var(--shopee-gray-dark);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .analytics-card-value {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--shopee-orange), var(--shopee-orange-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .analytics-card-subtitle {
            font-size: 13px;
            color: var(--shopee-text-light);
            font-weight: 500;
        }

        .analytics-card-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(238, 119, 82, 0.1), rgba(255, 138, 101, 0.1));
        }

        /* ===== CONTENT GRID ===== */
        .content-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        /* ===== FILTERS PANEL ===== */
        .filters-panel {
            background: var(--shopee-white);
            border: 1px solid var(--shopee-gray-medium);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            height: fit-content;
            position: sticky;
            top: 120px;
        }

        .filters-header {
            background: linear-gradient(135deg, var(--shopee-orange), var(--shopee-orange-dark));
            border-bottom: 1px solid var(--shopee-orange-dark);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filters-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--shopee-white);
            letter-spacing: -0.3px;
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: var(--shopee-white);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .filters-content {
            padding: 1.5rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .filter-section {
            margin-bottom: 1.5rem;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--shopee-text);
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 6px;
            transition: background-color 0.2s;
            user-select: none;
        }

        .filter-title:hover {
            background-color: var(--shopee-gray-light);
        }

        .filter-title span {
            color: var(--shopee-orange);
            font-size: 12px;
            transition: transform 0.3s;
        }

        .filter-title.collapsed span {
            transform: rotate(-180deg);
        }

        .filter-title.collapsed + .filter-options {
            display: none;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-left: 0.5rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            padding: 0.4rem 0.5rem;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .filter-option:hover {
            background-color: var(--shopee-gray-light);
        }

        .filter-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--shopee-orange);
            border-radius: 4px;
        }

        .filter-option label {
            font-size: 13px;
            color: var(--shopee-text);
            cursor: pointer;
            flex: 1;
            font-weight: 500;
        }

        .filters-footer {
            border-top: 1px solid var(--shopee-gray-medium);
            padding: 1rem 1.5rem;
            background-color: var(--shopee-gray-light);
            font-size: 12px;
            color: var(--shopee-text-light);
            font-weight: 600;
        }

        /* ===== TABLE ===== */
        .table-container {
            background: var(--shopee-white);
            border: 1px solid var(--shopee-gray-medium);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: linear-gradient(135deg, var(--shopee-orange), var(--shopee-orange-dark));
            border-bottom: 2px solid var(--shopee-orange-dark);
        }

        th {
            padding: 1.2rem 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--shopee-white);
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--shopee-gray-medium);
            color: var(--shopee-text);
            font-weight: 500;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: rgba(238, 119, 82, 0.05);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            min-width: 40px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-badge.P {
            background: linear-gradient(135deg, rgba(29, 191, 96, 0.15), rgba(29, 191, 96, 0.05));
            color: #1DBF60;
            border: 1px solid rgba(29, 191, 96, 0.3);
        }

        .status-badge.FO {
            background: linear-gradient(135deg, rgba(238, 77, 45, 0.15), rgba(238, 77, 45, 0.05));
            color: #EE4D2D;
            border: 1px solid rgba(238, 77, 45, 0.3);
        }

        .status-badge.DSR {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.15), rgba(255, 170, 0, 0.05));
            color: #FFAA00;
            border: 1px solid rgba(255, 170, 0, 0.3);
        }

        .status-badge.AM {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.15), rgba(0, 102, 255, 0.05));
            color: #0066FF;
            border: 1px solid rgba(0, 102, 255, 0.3);
        }

        .status-badge.DF {
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.15), rgba(156, 39, 176, 0.05));
            color: #9C27B0;
            border: 1px solid rgba(156, 39, 176, 0.3);
        }

        .status-badge.DV {
            background: linear-gradient(135deg, rgba(233, 30, 99, 0.15), rgba(233, 30, 99, 0.05));
            color: #E91E63;
            border: 1px solid rgba(233, 30, 99, 0.3);
        }

        .status-badge.FE {
            background: linear-gradient(135deg, rgba(0, 150, 136, 0.15), rgba(0, 150, 136, 0.05));
            color: #009688;
            border: 1px solid rgba(0, 150, 136, 0.3);
        }

        .status-badge.AL {
            background: linear-gradient(135deg, rgba(96, 125, 139, 0.15), rgba(96, 125, 139, 0.05));
            color: #607D8B;
            border: 1px solid rgba(96, 125, 139, 0.3);
        }

        .status-badge.F {
            background: linear-gradient(135deg, rgba(255, 87, 34, 0.15), rgba(255, 87, 34, 0.05));
            color: #FF5722;
            border: 1px solid rgba(255, 87, 34, 0.3);
        }

        .status-badge.BH {
            background: linear-gradient(135deg, rgba(103, 58, 183, 0.15), rgba(103, 58, 183, 0.05));
            color: #673AB7;
            border: 1px solid rgba(103, 58, 183, 0.3);
        }

        .status-badge.DP {
            background: linear-gradient(135deg, rgba(0, 188, 212, 0.15), rgba(0, 188, 212, 0.05));
            color: #00BCD4;
            border: 1px solid rgba(0, 188, 212, 0.3);
        }

        .status-badge.NC {
            background: linear-gradient(135deg, rgba(158, 158, 158, 0.15), rgba(158, 158, 158, 0.05));
            color: #9E9E9E;
            border: 1px solid rgba(158, 158, 158, 0.3);
        }

        .status-badge.S1 {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.15), rgba(76, 175, 80, 0.05));
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--shopee-gray-light);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--shopee-orange), var(--shopee-orange-light));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--shopee-orange-dark);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .filters-panel {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }

            .search-container {
                max-width: 100%;
            }

            .analytics-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1.5rem 1rem;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 0.75rem 0.5rem;
            }

            .analytics-card-value {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">S</div>
                <div class="logo-text">
                    <h1>Collaborator Hub</h1>
                    <p>Shopee Logistics</p>
                </div>
            </div>
            <div class="search-container">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Buscar colaborador, código ou BPO...">
                </div>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <label for="fileUpload" style="background: linear-gradient(135deg, var(--shopee-orange), var(--shopee-orange-dark)); color: white; padding: 0.7rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; transition: all 0.3s; box-shadow: 0 4px 12px rgba(238, 119, 82, 0.3);">
                    📤 Atualizar Dados
                </label>
                <input type="file" id="fileUpload" accept=".csv,.tsv,.txt" style="display: none;">
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Analytics Grid -->
        <div class="analytics-grid">
            <div class="analytics-card">
                <div class="analytics-card-content">
                    <div class="analytics-card-label">Total de Colaboradores</div>
                    <div class="analytics-card-value" id="totalCount">119</div>
                </div>
                <div class="analytics-card-icon">👥</div>
            </div>
            <div class="analytics-card">
                <div class="analytics-card-content">
                    <div class="analytics-card-label">Presentes Hoje</div>
                    <div class="analytics-card-value" id="presentCount">0</div>
                    <div class="analytics-card-subtitle" id="presentPercent">0% de presença</div>
                </div>
                <div class="analytics-card-icon">✅</div>
            </div>
            <div class="analytics-card">
                <div class="analytics-card-content">
                    <div class="analytics-card-label">Ausentes</div>
                    <div class="analytics-card-value" id="absentCount">0</div>
                </div>
                <div class="analytics-card-icon">❌</div>
            </div>
            <div class="analytics-card">
                <div class="analytics-card-content">
                    <div class="analytics-card-label">Em Licença/Folga</div>
                    <div class="analytics-card-value" id="leaveCount">0</div>
                </div>
                <div class="analytics-card-icon">📋</div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Filters Panel -->
            <div class="filters-panel">
                <div class="filters-header">
                    <h3>🎯 Filtros</h3>
                    <button class="clear-btn" id="clearBtn" style="display: none;">✕ Limpar</button>
                </div>
                <div class="filters-content">
                    <!-- BPO Filter -->
                    <div class="filter-section">
                        <div class="filter-title" onclick="toggleSection(this)">
                            BPO
                            <span>▼</span>
                        </div>
                        <div class="filter-options" id="bpoOptions"></div>
                    </div>

                    <!-- Status Filter -->
                    <div class="filter-section">
                        <div class="filter-title" onclick="toggleSection(this)">
                            Status
                            <span>▼</span>
                        </div>
                        <div class="filter-options" id="statusOptions"></div>
                    </div>
                </div>
                <div class="filters-footer">
                    <span id="resultCount">119 resultados</span>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <div class="table-wrapper">
                    <table id="collaboratorsTable">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Código</th>
                                <th>BPO</th>
                                <th>Cargo</th>
                                <th>Contrato</th>
                                <th>Admissão</th>
                                <th>Turno</th>
                                <th colspan="30">Status por Data (Abril/2026)</th>
                            </tr>
                            <tr id="daysHeader" style="background: linear-gradient(135deg, rgba(238, 119, 82, 0.05), rgba(255, 138, 101, 0.05)); border-bottom: 2px solid var(--shopee-orange);">
                                <th style="width: 150px;"></th>
                                <th style="width: 100px;"></th>
                                <th style="width: 60px;"></th>
                                <th style="width: 120px;"></th>
                                <th style="width: 90px;"></th>
                                <th style="width: 90px;"></th>
                                <th style="width: 100px;"></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados dos colaboradores (será preenchido com dados reais)
        let collaboratorsData = [];

        // Dados embutidos (substitua com dados reais)
        const rawData = DADOS_COLABORADORES_AQUI;

        function initializeApp() {
            // Processar dados
            collaboratorsData = rawData.map(c => ({
                ...c,
                Nome: c['Nome do colaborador(a)'].split(' ').slice(0, -1).join(' ')
            }));

            populateDayHeaders();
            initializeFilters();
            renderCollaborators(collaboratorsData);
            updateAnalytics();
        }

        function populateDayHeaders() {
            const daysHeader = document.getElementById('daysHeader');
            const daysOfWeek = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
            
            // Clear existing headers
            daysHeader.innerHTML = '';
            
            // Add empty cells for fixed columns
            for (let i = 0; i < 7; i++) {
                const th = document.createElement('th');
                daysHeader.appendChild(th);
            }
            
            // Add day headers for each date
            for (let i = 1; i <= 30; i++) {
                const date = new Date(2026, 3, i); // April 2026
                const dayOfWeek = daysOfWeek[date.getDay()];
                const th = document.createElement('th');
                th.style.fontSize = '11px';
                th.style.fontWeight = '600';
                th.style.color = 'var(--shopee-text)';
                th.style.padding = '0.6rem 0.4rem';
                th.style.textAlign = 'center';
                th.innerHTML = `<div style="font-size: 10px; color: var(--shopee-gray-dark);">Dia ${i}</div><div style="font-size: 11px; font-weight: 700;">${dayOfWeek}</div>`;
                daysHeader.appendChild(th);
            }
        }

        function initializeFilters() {
            const allBPOs = [...new Set(collaboratorsData.map(c => c.BPO))].sort();
            const allStatuses = getAllStatuses();

            const bpoOptions = document.getElementById('bpoOptions');
            allBPOs.forEach(bpo => {
                const div = document.createElement('div');
                div.className = 'filter-option';
                div.innerHTML = `
                    <input type="checkbox" id="bpo-${bpo}" value="${bpo}" onchange="applyFilters()">
                    <label for="bpo-${bpo}">${bpo}</label>
                `;
                bpoOptions.appendChild(div);
            });

            const statusOptions = document.getElementById('statusOptions');
            allStatuses.forEach(status => {
                const div = document.createElement('div');
                div.className = 'filter-option';
                div.innerHTML = `
                    <input type="checkbox" id="status-${status}" value="${status}" onchange="applyFilters()">
                    <label for="status-${status}">${status}</label>
                `;
                statusOptions.appendChild(div);
            });
        }

        function getAllStatuses() {
            const statuses = new Set();
            collaboratorsData.forEach(c => {
                for (let i = 1; i <= 30; i++) {
                    const date = `${String(i).padStart(2, '0')}/04/2026`;
                    const status = c[date];
                    if (status) statuses.add(status);
                }
            });
            return Array.from(statuses).sort();
        }

        function toggleSection(element) {
            element.classList.toggle('collapsed');
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedBPOs = Array.from(document.querySelectorAll('#bpoOptions input:checked')).map(c => c.value);
            const selectedStatuses = Array.from(document.querySelectorAll('#statusOptions input:checked')).map(c => c.value);

            const filtered = collaboratorsData.filter(c => {
                const matchesSearch = c.Código.toLowerCase().includes(searchTerm) || 
                                     c.Nome.toLowerCase().includes(searchTerm) ||
                                     c.BPO.toLowerCase().includes(searchTerm);
                const matchesBPO = selectedBPOs.length === 0 || selectedBPOs.includes(c.BPO);
                
                let matchesStatus = selectedStatuses.length === 0;
                if (selectedStatuses.length > 0) {
                    for (let i = 1; i <= 30; i++) {
                        const date = `${String(i).padStart(2, '0')}/04/2026`;
                        if (selectedStatuses.includes(c[date])) {
                            matchesStatus = true;
                            break;
                        }
                    }
                }

                return matchesSearch && matchesBPO && matchesStatus;
            });

            renderCollaborators(filtered);
            updateResultCount(filtered.length);
            updateClearButton();
        }

        function renderCollaborators(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(c => {
                const row = document.createElement('tr');
                
                let statusCells = '';
                for (let i = 1; i <= 30; i++) {
                    const date = `${String(i).padStart(2, '0')}/04/2026`;
                    const status = c[date] || '';
                    statusCells += `<td>${status ? `<span class="status-badge ${status}">${status}</span>` : ''}</td>`;
                }

                row.innerHTML = `
                    <td><strong>${c.Nome}</strong></td>
                    <td>${c.Código}</td>
                    <td><strong style="color: var(--shopee-orange);">${c.BPO}</strong></td>
                    <td>${c.Cargo.substring(0, 25)}</td>
                    <td>${c.Contrato.substring(0, 12)}</td>
                    <td>${c.Admissão}</td>
                    <td>${c.Turno.substring(0, 18)}</td>
                    ${statusCells}
                `;
                tbody.appendChild(row);
            });
        }

        function updateResultCount(count) {
            document.getElementById('resultCount').textContent = `${count} resultado${count !== 1 ? 's' : ''}`;
        }

        function updateClearButton() {
            const hasFilters = document.querySelectorAll('input[type="checkbox"]:checked').length > 0 || 
                             document.getElementById('searchInput').value.length > 0;
            document.getElementById('clearBtn').style.display = hasFilters ? 'block' : 'none';
        }

        function updateAnalytics() {
            const today = new Date();
            const todayStr = `${String(today.getDate()).padStart(2, '0')}/04/2026`;
            
            let presentCount = 0, absentCount = 0, leaveCount = 0;

            collaboratorsData.forEach(c => {
                const status = c[todayStr];
                if (status === 'P') presentCount++;
                else if (status === 'FO') absentCount++;
                else if (['DSR', 'DF', 'DV', 'FE', 'AL'].includes(status)) leaveCount++;
            });

            document.getElementById('presentCount').textContent = presentCount;
            document.getElementById('absentCount').textContent = absentCount;
            document.getElementById('leaveCount').textContent = leaveCount;
            document.getElementById('presentPercent').textContent = `${Math.round(presentCount / collaboratorsData.length * 100)}% de presença`;
        }

        // File Upload Handler
        document.getElementById('fileUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const content = event.target.result;
                    const newData = parseTabSeparatedData(content);
                    
                    if (newData && newData.length > 0) {
                        collaboratorsData = newData.map(c => ({
                            ...c,
                            Nome: c['Nome do colaborador(a)'].split(' ').slice(0, -1).join(' ')
                        }));
                        
                        document.getElementById('bpoOptions').innerHTML = '';
                        document.getElementById('statusOptions').innerHTML = '';
                        initializeFilters();
                        renderCollaborators(collaboratorsData);
                        updateAnalytics();
                        
                        document.getElementById('searchInput').value = '';
                        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
                        
                        alert('Dados atualizados com sucesso! ' + newData.length + ' colaboradores carregados.');
                    } else {
                        alert('Erro ao processar arquivo.');
                    }
                } catch (error) {
                    alert('Erro: ' + error.message);
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        function parseTabSeparatedData(content) {
            const lines = content.trim().split('\n');
            if (lines.length < 2) return null;

            const headers = lines[0].split('\t');
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split('\t');
                const row = {};
                
                for (let j = 0; j < headers.length; j++) {
                    row[headers[j].trim()] = values[j] ? values[j].trim() : '';
                }
                
                if (row['Código'] && row['Código'] !== 'Não encontrado, contate WFM') {
                    data.push(row);
                }
            }

            return data.length > 0 ? data : null;
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
            document.getElementById('searchInput').value = '';
            applyFilters();
        });

        // Initialize
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
